name: Release Helm chart
on:
  push:
    branches:
      - master
    paths:
      - 'charts/postfix-exporter/Chart.yaml'
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
jobs:
  release:
    uses: hsn723/actions/.github/workflows/helm-release.yml@db80a3d03a73c874694fbeb8387b4fda6b9b68e4 # v1.0.27
    secrets: inherit
    with:
      upload_as_oci: true
      chart_name: postfix-exporter
