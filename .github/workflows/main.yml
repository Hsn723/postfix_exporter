name: main
on:
  push:
    branches:
      - master
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - master
permissions:
  contents: read
  pull-requests: write
jobs:
  verify:
    uses: hsn723/actions/.github/workflows/verify.yml@c503c7b5fb7b07887fdc678505e69e37cff1b3f8 # v1.0.35
    secrets: inherit
    with:
      lint-pre: |
        make libsystemd-dev
      additional-dry-run-setup: |
        make libsystemd-dev
        make gcc-aarch64-linux-gnu
