name: Tag and release
on:
  push:
    branches:
      - master
    paths:
      - VERSION
permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write
jobs:
  release:
    uses: hsn723/actions/.github/workflows/release.yml@c503c7b5fb7b07887fdc678505e69e37cff1b3f8 # v1.0.35
    secrets: inherit
    with:
      additional-setup: |
        make libsystemd-dev
        make gcc-aarch64-linux-gnu
      upload-image-sbom: false
