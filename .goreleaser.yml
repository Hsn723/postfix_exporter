version: 2
project_name: postfix_exporter
before:
  hooks:
    - go mod download
builds:
  - id: minimal
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=nosystemd,nodocker
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -w -s
        -X github.com/prometheus/common/version.Version={{ .Version }}
        -X github.com/prometheus/common/version.Revision={{ .Commit }}
        -X github.com/prometheus/common/version.Branch={{ .Branch }}
        -X github.com/prometheus/common/version.BuildDate={{ .Date }}
  - id: with-docker
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -tags=nosystemd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -w -s
        -X github.com/prometheus/common/version.Version={{ .Version }}
        -X github.com/prometheus/common/version.Revision={{ .Commit }}
        -X github.com/prometheus/common/version.Branch={{ .Branch }}
        -X github.com/prometheus/common/version.BuildDate={{ .Date }}
  - id: with-systemd
    goarch:
      - amd64
      - arm64
    flags:
      - -tags=nodocker
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Arch "arm64" }}CC=/usr/bin/aarch64-linux-gnu-gcc{{- end }}
    goos:
      - linux
    ldflags:
      - -w -s
        -X github.com/prometheus/common/version.Version={{ .Version }}
        -X github.com/prometheus/common/version.Revision={{ .Commit }}
        -X github.com/prometheus/common/version.Branch={{ .Branch }}
        -X github.com/prometheus/common/version.BuildDate={{ .Date }}
  - id: aio
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Arch "arm64" }}CC=/usr/bin/aarch64-linux-gnu-gcc{{- end }}
    ldflags:
      - -w -s
        -X github.com/prometheus/common/version.Version={{ .Version }}
        -X github.com/prometheus/common/version.Revision={{ .Commit }}
        -X github.com/prometheus/common/version.Branch={{ .Branch }}
        -X github.com/prometheus/common/version.BuildDate={{ .Date }}
dockers_v2:
  - id: minimal
    ids:
      - minimal
    images:
      - "ghcr.io/hsn723/{{.ProjectName}}"
    tags:
      - "{{ .Version }}-minimal"
      - "{{ .Major }}.{{ .Minor }}-minimal"
    extra_files:
      - LICENSE
    annotations:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.base.name": "{{ .BaseImage }}"
      "org.opencontainers.image.base.digest": "{{ .BaseImageDigest }}"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true
  - id: default
    ids:
      - with-docker
    images:
      - "ghcr.io/hsn723/{{.ProjectName}}"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
    extra_files:
      - LICENSE
    annotations:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.base.name": "{{ .BaseImage }}"
      "org.opencontainers.image.base.digest": "{{ .BaseImageDigest }}"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true
archives:
  - id: default
    ids:
      - default
  - id: with-docker
    ids:
      - with-docker
    name_template: "{{ .ProjectName }}_docker_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: with-systemd
    ids:
      - with-systemd
    name_template: "{{ .ProjectName }}_systemd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: aio
    ids:
      - aio
    name_template: "{{ .ProjectName }}_aio_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  use: github-native
source:
  enabled: true
sboms:
  - id: archive
    artifacts: archive
    env:
      - AQUA_GLOBAL_CONFIG={{ .Env.AQUA_GLOBAL_CONFIG }}
  - id: source
    artifacts: source
    env:
      - AQUA_GLOBAL_CONFIG={{ .Env.AQUA_GLOBAL_CONFIG }}
signs:
  - cmd: cosign
    signature: '${artifact}.sigstore.json'
    args:
      - sign-blob
      - '--yes'
      - '--bundle=${signature}'
      - '${artifact}'
    artifacts: all
    output: true
docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - 'sign'
      - '--yes'
      - '${artifact}'
docker_digest:
  name_template: 'digests.txt'
